name: Update data

on:
  schedule:
    # Hourly. The fetch script itself skips the network unless a match is
    # expected to have ended since the last fetch (see scripts/fetch-data.mjs).
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a refresh even if no match has ended'
        type: boolean
        default: false

# contents: push the regenerated JSON back to the repo.
# pages / id-token: publish the rebuilt site (a GITHUB_TOKEN push does NOT
# trigger deploy.yml, so we build + deploy here when data changes).
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fetch & normalize data
        env:
          FORCE: ${{ inputs.force && '1' || '' }}
        run: node scripts/fetch-data.mjs

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data)" ]; then
            git add public/data
            git commit -m "chore(data): refresh World Cup 2026 data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data updated and pushed."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes to commit."
          fi

      # Build from the local tree (already holds the fresh data) so the
      # published artifact matches the commit we just pushed.
      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - uses: actions/configure-pages@v5
        if: steps.commit.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.commit.outputs.changed == 'true'
        with:
          path: dist

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
