name: Update data

on:
  schedule:
    # Every 10 min. The fetch script skips entirely unless a match has started
    # or ended since the last sync (see scripts/fetch-data.mjs), so most ticks
    # are no-ops and the live API's request budget is only spent on match days.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a refresh even if no match has ended'
        type: boolean
        default: false

# contents: push the regenerated JSON back to the repo.
# pages / id-token: publish the rebuilt site (a GITHUB_TOKEN push does NOT
# trigger deploy.yml, so we build + deploy here when data changes).
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fetch & normalize data
        env:
          FORCE: ${{ inputs.force && '1' || '' }}
          # Results overlay is OFF: API-Football's free tier blocks the
          # season-scoped /fixtures endpoint, so results come from upbound alone.
          # (Live in-match scores still work client-side via the Worker /live.)
        run: node scripts/fetch-data.mjs

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data)" ]; then
            git add public/data
            git commit -m "chore(data): refresh World Cup 2026 data"
            # Rebase-then-push with retries: concurrency only serializes other
            # update-data runs, so a manual/Worker push to main can land between
            # checkout and push and reject a bare `git push` (non-fast-forward).
            pushed=false
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { pushed=true; break; }
              echo "push attempt $i failed; retrying after rebase…"
              sleep 5
            done
            if [ "$pushed" != true ]; then
              echo "::error::failed to push data update after 3 attempts"
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data updated and pushed."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes to commit."
          fi

      # Build from the local tree (already holds the fresh data) so the
      # published artifact matches the commit we just pushed.
      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build
        env:
          # Optional: set repo Variable LIVE_API_URL to enable live scores.
          VITE_LIVE_API_URL: ${{ vars.LIVE_API_URL }}

      - uses: actions/configure-pages@v5
        if: steps.commit.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.commit.outputs.changed == 'true'
        with:
          path: dist

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
