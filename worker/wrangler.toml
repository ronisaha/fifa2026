name = "wc2026-live-scores"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Central cache shared by all visitors (one record). Create with:
#   npx wrangler kv namespace create LIVE_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "LIVE_KV", id = "289f16d8fdbf429d996addb4cdd4377a" }
]

[vars]
# Lock CORS to your site (use "*" only for local testing).
ALLOW_ORIGIN = "https://fifa2026.xiidea.net"

# World Cup season in BALLDONTLIE (2018 | 2022 | 2026).
SEASON = "2026"

# One shared upstream fetch serves both /live and /fixtures. REFRESH_S=90s keeps
# us to ~0.7 req/min (plus pagination) — well under the free tier's 5 req/min.
REFRESH_S = "90"
EDGE_S = "30"
DAILY_CAP = "2000"   # backstop only; REFRESH_S vs 5/min is the real limiter
MAX_PAGES = "4"      # 104 matches > 100/page, so up to 2 pages are fetched

# BALLDONTLIE_KEY is a SECRET, not set here. Get a free key at
# https://balldontlie.io and add it with:
#   npx wrangler secret put BALLDONTLIE_KEY
