name = "wc2026-live-scores"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Central cache shared by all visitors (one record). Create with:
#   npx wrangler kv namespace create LIVE_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "LIVE_KV", id = "289f16d8fdbf429d996addb4cdd4377a" }
]

# Cron trigger: reliably drive the data-refresh Action. GitHub throttles its own
# schedule: cron (a */10 fires ~hourly), so the Worker fires workflow_dispatch on
# Cloudflare's precise cron instead. See dispatchDataRefresh() in src/index.js.
[triggers]
crons = ["*/10 * * * *"]

[vars]
# GitHub repo + workflow to dispatch on each cron tick. GH_DISPATCH_TOKEN is a
# SECRET (a PAT with Actions: read+write), set with:
#   npx wrangler secret put GH_DISPATCH_TOKEN
GH_REPO = "ronisaha/fifa2026"
GH_WORKFLOW = "update-data.yml"
GH_REF = "main"

# Lock CORS to your site (use "*" only for local testing).
ALLOW_ORIGIN = "https://fifa2026.xiidea.net"

# World Cup league + season in API-Football.
WC_LEAGUE_ID = "1"
SEASON = "2026"

# /live tunables (browser banner + cards). fixtures?live=all works on the free
# plan; only the season-scoped /fixtures is plan-blocked. At 120s refresh, the
# 90/day cap covers ~3h of live football/day — comfortably under the 100/day quota.
REFRESH_INTERVAL_S = "120"
LIVE_DAILY_CAP = "90"
EDGE_CACHE_S = "30"

# Schedule gate: /live only spends a budget call when a WC fixture is actually in
# its live window. The schedule is the site's own published matches.json (free,
# on GitHub Pages), cached in KV and re-pulled at most every SCHEDULE_TTL_S.
# A fixture counts as "live" from LIVE_PRE_MIN before kickoff to LIVE_WINDOW_MIN
# after (covers extra time + stoppage). Between matches, upstream is never hit.
SCHEDULE_URL = "https://fifa2026.xiidea.net/data/matches.json"
SCHEDULE_TTL_S = "1800"
LIVE_PRE_MIN = "5"
LIVE_WINDOW_MIN = "150"

# Data-refresh cron gate (shouldDispatch): the cron only fires the update-data
# Action when a fixture could have changed something — from DISPATCH_PRE_MIN
# before kickoff to DISPATCH_POST_MIN after, plus a catch-up up to
# DISPATCH_PENDING_MIN after KO while a started match is still not marked
# finished in our published data (i.e. its result hasn't synced yet). Between
# matches, when everything is synced, the Action is not triggered at all.
DISPATCH_PRE_MIN = "10"
DISPATCH_POST_MIN = "150"
DISPATCH_PENDING_MIN = "360"

# /fixtures is plan-blocked on the free tier (season not accessible), so the
# results overlay is OFF (LIVE_FIXTURES_URL is not set in the Action). These
# caps just bound the endpoint if it's ever called.
FIXTURES_REFRESH_S = "600"
FIXTURES_DAILY_CAP = "5"
FIXTURES_EDGE_S = "300"

# APIFOOTBALL_KEY is a SECRET, not set here. Add it with:
#   npx wrangler secret put APIFOOTBALL_KEY
