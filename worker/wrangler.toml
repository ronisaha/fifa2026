name = "wc2026-live-scores"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Central cache shared by all visitors (one record). Create with:
#   npx wrangler kv namespace create LIVE_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "LIVE_KV", id = "289f16d8fdbf429d996addb4cdd4377a" }
]

[vars]
# Lock CORS to your site (use "*" only for local testing).
ALLOW_ORIGIN = "https://fifa2026.xiidea.net"

# Upstream is the community API at worldcup26.ir — free, no API key required.
# One shared fetch serves both /live and /fixtures, refreshed every REFRESH_S to
# be gentle on the upstream (~0.7 req/min).
REFRESH_S = "90"
EDGE_S = "30"
DAILY_CAP = "2000"   # backstop only; REFRESH_S is the real limiter

# No secret needed — worldcup26.ir/get/games requires no auth.
